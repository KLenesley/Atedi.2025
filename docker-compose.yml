services:
  db:
    image: mariadb:10.11
    container_name: ma_bdd_mariadb
    restart: unless-stopped
    env_file:
      - .env.local # Charge les variables depuis .env.local
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck: # pour s'assurer que la BDD est prête avant de démarrer l'app
      test: ["CMD", "mariadb-admin", "--protocol=tcp", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: mon_app_symfony
    restart: unless-stopped
    volumes:
      - .:/var/www
    env_file:
      - .env.local # Charge les variables depuis .env.local
    depends_on:
      db:
        condition: service_healthy   # OBLIGATOIRE avec healthcheck

  web:
    image: nginx:alpine
    container_name: mon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  db_data:
